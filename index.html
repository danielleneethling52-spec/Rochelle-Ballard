<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBA Inspections | Quality Auditing Consultants</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body { background-color: #020617; color: white; font-family: 'Inter', sans-serif; }
        .hero-gradient { background: linear-gradient(rgba(2, 6, 23, 0.8), rgba(2, 6, 23, 0.9)), url('https://images.unsplash.com/photo-1581092160562-40aa08e78837?auto=format&fit=crop&q=80&w=2000'); background-size: cover; }
        .btn-blue { background: #2563eb; transition: 0.3s; }
        .btn-blue:hover { background: #1d4ed8; box-shadow: 0 0 20px rgba(37, 99, 235, 0.5); }
        .glass-nav { background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .floating-cta { position: fixed; bottom: 30px; right: 30px; z-index: 100; background: #1e293b; border: 1px solid #3b82f6; border-radius: 50px; padding: 12px 24px; display: flex; align-items: center; gap: 10px; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <nav class="fixed w-full z-50 glass-nav px-8 py-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <span class="bg-blue-600 text-white px-2 py-1 rounded font-extrabold italic">RBA</span>
            <span class="text-blue-500 font-bold hidden md:block">Inspections</span>
        </div>
        <div class="hidden md:flex space-x-8 text-sm font-semibold text-gray-400">
            <a href="index.html" class="text-white border-b-2 border-blue-500 pb-1">Home</a>
            <a href="services.html" class="hover:text-white transition">Services</a>
            <a href="cases.html" class="hover:text-white transition">Case Studies</a>
            <a href="reviews.html" class="hover:text-white transition">Reviews</a>
            <a href="blog.html" class="hover:text-white transition">Blog</a>
            <a href="contact.html" class="hover:text-white transition">Contact</a>
        </div>
        <a href="contact.html" class="btn-blue px-6 py-2 rounded-lg font-bold text-sm">Book Inspection</a>
    </nav>

    <header class="hero-gradient min-h-screen flex items-center px-8 md:px-20 pt-20">
        <div class="max-w-3xl" data-aos="fade-right">
            <h1 class="text-5xl md:text-7xl font-extrabold leading-tight mb-6">Ensuring Product <span class="text-blue-500 italic">Quality</span> Every Step.</h1>
            <p class="text-xl text-gray-300 mb-8 font-light">Professional on-site inspections and factory audits to safeguard your global supply chain. Based in South Africa, serving the world.</p>
            <div class="flex gap-4">
                <a href="contact.html" class="btn-blue px-8 py-4 rounded-xl font-bold text-lg">Get Started Now</a>
                <a href="services.html" class="border border-white/20 px-8 py-4 rounded-xl font-bold text-lg hover:bg-white/10 transition">View Services</a>
            </div>
        </div>
    </header>

    <div onclick="location.href='contact.html'" class="floating-cta group hover:scale-105 transition">
        <span class="font-bold text-sm">Book Inspection</span>
        <i class="fa-solid fa-calendar-check text-blue-500"></i>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 1000, once: true });</script>
</body>
</html>
