<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | RBA Inspections</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #020617; color: white; }
        .input-dark { background: #0f172a; border: 1px solid #1e293b; color: white; padding: 1rem; border-radius: 0.75rem; width: 100%; outline: none; transition: 0.3s; }
        .input-dark:focus { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body>
    <nav class="w-full px-8 py-6 flex justify-between items-center border-b border-white/5">
        <a href="index.html" class="text-2xl font-black italic"><span class="text-blue-600">RBA</span> Inspections</a>
        <a href="index.html" class="text-sm font-bold text-gray-400">Back to Home</a>
    </nav>

    <main class="max-w-6xl mx-auto py-20 px-8 grid md:grid-cols-2 gap-20">
        <div>
            <h1 class="text-6xl font-black mb-6 italic">Let's Talk <span class="text-blue-600">Quality.</span></h1>
            <p class="text-gray-400 text-lg mb-12">Headquartered in South Africa, providing auditing and inspection solutions globally.</p>
            
            <div class="space-y-8">
                <div class="flex items-center gap-6">
                    <div class="w-12 h-12 bg-blue-600/10 border border-blue-500/20 rounded-full flex items-center justify-center text-blue-500">
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                    <div>
                        <p class="text-xs font-bold text-blue-500 uppercase">Email Us</p>
                        <p class="text-xl">admin@rbainspections.co.za</p>
                    </div>
                </div>
                <div class="flex items-center gap-6">
                    <div class="w-12 h-12 bg-blue-600/10 border border-blue-500/20 rounded-full flex items-center justify-center text-blue-500">
                        <i class="fa-solid fa-phone"></i>
                    </div>
                    <div>
                        <p class="text-xs font-bold text-blue-500 uppercase">Call Us</p>
                        <p class="text-xl">+27 (0)60 971 6704</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-slate-900 p-10 rounded-3xl border border-white/5 shadow-2xl">
            <form action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST" class="space-y-6">
                <input type="text" name="name" placeholder="Your Name" required class="input-dark">
                <input type="email" name="email" placeholder="Email Address" required class="input-dark">
                <select name="service" class="input-dark">
                    <option>Product Inspection</option>
                    <option>Factory Audit</option>
                    <option>Lab Testing</option>
                </select>
                <textarea name="message" rows="5" placeholder="Project Details" class="input-dark"></textarea>
                <button type="submit" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition shadow-lg shadow-blue-500/20">Send Inquiry</button>
            </form>
        </div>
    </main>
</body>
</html>
